  function renderCalcSection(key) {
    const isOpen = !!uiState.calcOpen[key];
    const rows = state[key].calc || [];
    const total = rows.reduce((s, r) => s + (r.perUnit * r.qty), 0);
    const suggestedPct = totalIncome() > 0 ? Math.round((total / totalIncome()) * 100) : 0;
    let inner = '';
    if (isOpen) {
      const rowsHtml = rows.length === 0 ? '<li class="desc" style="font-style:italic;">Belum ada rincian</li>' : rows.map(r => `
        <li>
          <span class="desc">${escapeHtml(r.name)} — ${formatRupiah(r.perUnit)} × ${r.qty}</span>
          <span class="subtotal num">${formatRupiah(r.perUnit * r.qty)}</span>
          <button class="record-btn" data-action="add-calc-to-tx" data-cat="${key}" data-id="${r.id}" title="Catat sebagai pengeluaran">→</button>
          <button data-action="del-calc-row" data-cat="${key}" data-id="${r.id}" title="Hapus">✕</button>
        </li>
      `).join('');
      inner = `
        <div class="calc-panel">
          <p class="calc-hint">Rincikan kebutuhan per item, misal "Makan" dengan harga per hari Rp50.000 selama 30 hari.</p>
          <ul class="calc-rows">${rowsHtml}</ul>
          <div class="calc-add">
            <input class="calc-name" type="text" placeholder="Nama (mis. Makan)" data-role="calc-name-${key}">
            <input class="calc-perunit num money-input" type="text" inputmode="numeric" placeholder="Rp per hari/satuan" data-role="calc-perunit-${key}">
            <input class="calc-qty num" type="number" placeholder="Jumlah hari" data-role="calc-qty-${key}">
            <button data-action="add-calc-row" data-cat="${key}">+</button>
          </div>
          <div class="calc-total-row"><span>Total estimasi</span><span class="num">${formatRupiah(total)}${totalIncome() > 0 ? ' (' + suggestedPct + '% dari pemasukan)' : ''}</span></div>
          ${rows.length > 0 ? `<button class="calc-record-all-btn" data-action="add-all-calc-to-tx" data-cat="${key}">→ Catat Semua ke Pengeluaran (${rows.length} item)</button>` : ''}
          <button class="calc-use-btn" data-action="use-calc" data-cat="${key}" ${totalIncome() <= 0 ? 'disabled' : ''}>Gunakan sebagai target bulanan</button>
        </div>
      `;
    }
    return `<button class="calc-toggle" data-action="toggle-calc" data-cat="${key}">🧮 Kalkulator Estimasi ${isOpen ? '▲' : '▼'}</button>${inner}`;
  }

          <div class="env-bar-track"><div class="env-bar-fill" style="width:${pctUsed}%; background:${over ? 'var(--brick)' : '#7A6C5D'}"></div></div>

            <span class="spent num" style="${over ? 'color:var(--brick)' : ''}">${formatRupiah(spent)} terpakai</span>

  // ---- events ----
  function attachHeaderEvents() {
    const incomeInput = document.getElementById('income-input');
    incomeInput.addEventListener('change', async (e) => {
      state.income = Math.max(0, parseMoneyString(e.target.value));
      render(); await saveState();
    });

    const toggleIncomeBtn = root.querySelector('[data-action="toggle-add-income"]');
    if (toggleIncomeBtn) toggleIncomeBtn.addEventListener('click', () => {
      uiState.addIncomeOpen = !uiState.addIncomeOpen;
      render();
    });
    const confirmIncomeBtn = root.querySelector('[data-action="confirm-add-income"]');
    if (confirmIncomeBtn) confirmIncomeBtn.addEventListener('click', async () => {
      const nameInput = document.getElementById('new-income-name');
      const amountInput = document.getElementById('new-income-amount');
      const name = nameInput.value.trim();
      const amount = parseMoneyString(amountInput.value);
      if (!name) { nameInput.focus(); return; }
      if (!amount || amount <= 0) { amountInput.focus(); return; }
      state.incomeExtra.push({ id: uid(), name, amount });
      uiState.addIncomeOpen = false;
      render(); await saveState();
    });
    root.querySelectorAll('[data-action="del-income-extra"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const id = e.currentTarget.getAttribute('data-id');
        state.incomeExtra = state.incomeExtra.filter(x => x.id !== id);
        render(); await saveState();
      });
    });
  }

  function archiveCurrentMonth() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const daruratDeposit = state.darurat.transactions.filter(t => isThisMonth(t.date) && t.type !== 'out').reduce((s, t) => s + t.amount, 0);
    const daruratWithdraw = state.darurat.transactions.filter(t => isThisMonth(t.date) && t.type === 'out').reduce((s, t) => s + t.amount, 0);
    const tabunganDeposit = state.tabungan.goals.reduce((s, g) => s + g.transactions.filter(t => isThisMonth(t.date)).reduce((ss, t) => ss + t.amount, 0), 0);
    const investasiDeposit = state.investasi.transactions.filter(t => isThisMonth(t.date)).reduce((s, t) => s + t.amount, 0);
    const record = {
      id: uid(), year, month,
      income: totalIncome(),
      pokokSpent: pokokSpent(),
      tambahanSpent: tambahanSpent(),
      utangSpent: state.utang.enabled ? utangSpent() : 0,
      daruratDeposit, daruratWithdraw, tabunganDeposit, investasiDeposit,
      daruratSaldoEnd: daruratSaldo(), tabunganSaldoEnd: tabunganSaldo(), investasiSaldoEnd: investasiSaldo(),
      closedAt: now.toISOString()
    };
    state.history = state.history.filter(r => !(r.year === year && r.month === month));
    state.history.push(record);
  }

  function attachKantongActionEvents() {
    root.querySelector('[data-action="reset-all"]').addEventListener('click', () => {
      uiState.confirmModal = {
        message: 'Yakin ingin menghapus semua data dan mengembalikan ke pengaturan awal? Riwayat bulan-bulan sebelumnya juga akan terhapus.',
        confirmLabel: 'Ya, reset semua',
        onConfirm: async () => { state = defaultState(); await saveState(); }
      };
      render();
    });

    root.querySelector('[data-action="close-month"]').addEventListener('click', () => {
      uiState.confirmModal = {
        message: 'Tutup bulan ini? Ringkasan bulan ini akan disimpan ke riwayat (bisa dilihat di halaman Tabel), lalu catatan Kebutuhan Pokok, Tambahan, dan Cicilan dikosongkan untuk bulan baru (saldo Dana Darurat, Tabungan, dan Investasi tetap tersimpan).',
        confirmLabel: 'Ya, tutup bulan ini',
        safe: true,
        onConfirm: async () => {
          archiveCurrentMonth();
          state.pokok.transactions = [];
          state.tambahan.transactions = [];
          state.utang.transactions = [];
          await saveState();
        }
      };
      render();
    });
  }

  function attachCardEvents() {
    // generic pct setters
    root.querySelectorAll('[data-action="set-pct"]').forEach(el => {
      el.addEventListener('change', async (e) => {
        const cat = e.target.getAttribute('data-cat');
        const val = Math.max(0, Math.min(100, Number(e.target.value) || 0));
        if (cat === 'utang') state.utang.pct = val; else state[cat].pct = val;
        render(); await saveState();
      });
    });

    root.querySelectorAll('[data-action="add-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.target.getAttribute('data-cat');
        const noteInput = root.querySelector(`[data-role="note-${cat}"]`);
        const amountInput = root.querySelector(`[data-role="amount-${cat}"]`);
        const dateInput = root.querySelector(`[data-role="txdate-${cat}"]`);
        const amount = parseMoneyString(amountInput.value);
        if (!amount || amount <= 0) { amountInput.focus(); return; }
        state[cat].transactions.push({ id: uid(), note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });
        render(); await saveState();
      });
    });

    root.querySelectorAll('[data-action="del-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');
        state[cat].transactions = state[cat].transactions.filter(t => t.id !== id);
        render(); await saveState();
      });
    });

    // darurat
    const daruratMonths = root.querySelector('[data-action="set-darurat-months"]');
    if (daruratMonths) daruratMonths.addEventListener('change', async (e) => {
      state.darurat.targetMonths = Math.max(1, Number(e.target.value) || 1);
      render(); await saveState();
    });
    const daruratPct = root.querySelector('[data-action="set-darurat-pct"]');
    if (daruratPct) daruratPct.addEventListener('change', async (e) => {
      state.darurat.pct = Math.max(0, Math.min(100, Number(e.target.value) || 0));
      render(); await saveState();
    });
    const addDarurat = root.querySelector('[data-action="add-tx-darurat"]');
    if (addDarurat) addDarurat.addEventListener('click', async () => {
      const type = root.querySelector('[data-role="type-darurat"]').value;
      const noteInput = root.querySelector('[data-role="note-darurat"]');
      const amountInput = root.querySelector('[data-role="amount-darurat"]');
      const dateInput = root.querySelector('[data-role="txdate-darurat"]');
      const amount = parseMoneyString(amountInput.value);
      if (!amount || amount <= 0) { amountInput.focus(); return; }
      state.darurat.transactions.push({ id: uid(), type, note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });
      render(); await saveState();
    });
    root.querySelectorAll('[data-action="del-tx-darurat"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const id = e.currentTarget.getAttribute('data-id');
        state.darurat.transactions = state.darurat.transactions.filter(t => t.id !== id);
        render(); await saveState();
      });
    });

    // tabungan goals
    root.querySelectorAll('[data-action="set-goal-target"]').forEach(el => {
      el.addEventListener('change', async (e) => {
        const goalId = e.currentTarget.getAttribute('data-goal');
        const goal = state.tabungan.goals.find(g => g.id === goalId);
        if (!goal) return;
        const newTarget = parseMoneyString(e.currentTarget.value);
        goal.target = Math.max(0, newTarget);
        render(); await saveState();
      });
    });
    const toggleAddGoal = root.querySelector('[data-action="toggle-add-goal"]');
    if (toggleAddGoal) toggleAddGoal.addEventListener('click', () => {
      uiState.addGoalOpen = !uiState.addGoalOpen;
      render();
    });
    const confirmAddGoal = root.querySelector('[data-action="confirm-add-goal"]');
    if (confirmAddGoal) confirmAddGoal.addEventListener('click', async () => {
      const nameInput = root.querySelector('[data-role="new-goal-name"]');
      const targetInput = root.querySelector('[data-role="new-goal-target"]');
      const name = nameInput.value.trim();
      const target = parseMoneyString(targetInput.value);
      if (!name) { nameInput.focus(); return; }
      if (!target || target <= 0) { targetInput.focus(); return; }
      state.tabungan.goals.push({ id: uid(), name, target, transactions: [] });
      uiState.addGoalOpen = false;
      render(); await saveState();
    });
    root.querySelectorAll('[data-action="del-goal"]').forEach(el => {
      el.addEventListener('click', (e) => {
        const goalId = e.currentTarget.getAttribute('data-goal');
        uiState.confirmModal = {
          message: 'Hapus tujuan tabungan ini beserta seluruh riwayatnya?',
          confirmLabel: 'Ya, hapus',
          onConfirm: async () => {
            state.tabungan.goals = state.tabungan.goals.filter(g => g.id !== goalId);
            await saveState();
          }
        };
        render();
      });
    });
    root.querySelectorAll('[data-action="add-goal-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const goalId = e.currentTarget.getAttribute('data-goal');
        const noteInput = root.querySelector(`[data-role="goal-note-${goalId}"]`);
        const amountInput = root.querySelector(`[data-role="goal-amount-${goalId}"]`);
        const dateInput = root.querySelector(`[data-role="goal-date-${goalId}"]`);
        const amount = parseMoneyString(amountInput.value);
        if (!amount || amount <= 0) { amountInput.focus(); return; }
        const goal = state.tabungan.goals.find(g => g.id === goalId);
        goal.transactions.push({ id: uid(), note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });
        render(); await saveState();
      });
    });

    // investasi
    const addInvestasi = root.querySelector('[data-action="add-tx-investasi"]');
    if (addInvestasi) addInvestasi.addEventListener('click', async () => {
      const instrument = root.querySelector('[data-role="instrument-investasi"]').value;
      const noteInput = root.querySelector('[data-role="note-investasi"]');
      const amountInput = root.querySelector('[data-role="amount-investasi"]');
      const dateInput = root.querySelector('[data-role="txdate-investasi"]');
      const amount = parseMoneyString(amountInput.value);
      if (!amount || amount <= 0) { amountInput.focus(); return; }
      state.investasi.transactions.push({ id: uid(), instrument, note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });
      render(); await saveState();
    });
    root.querySelectorAll('[data-action="del-tx-investasi"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const id = e.currentTarget.getAttribute('data-id');
        state.investasi.transactions = state.investasi.transactions.filter(t => t.id !== id);
        render(); await saveState();
      });
    });

    // utang enable
    const enableUtang = root.querySelector('[data-action="enable-utang"]');
    if (enableUtang) enableUtang.addEventListener('click', async () => {
      state.utang.enabled = true;
      state.utang.pct = state.utang.pct || 10;
      render(); await saveState();
    });

    // calculator (estimasi kebutuhan)
    root.querySelectorAll('[data-action="toggle-calc"]').forEach(el => {
      el.addEventListener('click', () => {
        const cat = el.getAttribute('data-cat');
        uiState.calcOpen[cat] = !uiState.calcOpen[cat];
        render();
      });
    });
    root.querySelectorAll('[data-action="add-calc-row"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const nameInput = root.querySelector(`[data-role="calc-name-${cat}"]`);
        const perUnitInput = root.querySelector(`[data-role="calc-perunit-${cat}"]`);
        const qtyInput = root.querySelector(`[data-role="calc-qty-${cat}"]`);
        const perUnit = parseMoneyString(perUnitInput.value);
        const qty = Number(qtyInput.value);
        const itemName = nameInput.value.trim();
        if (!itemName) { nameInput.focus(); return; }
        if (!perUnit || perUnit <= 0 || !qty || qty <= 0) {
          (perUnit > 0 ? qtyInput : perUnitInput).focus();
          return;
        }
        state[cat].calc.push({ id: uid(), name: itemName, perUnit, qty });
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="del-calc-row"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');
        state[cat].calc = state[cat].calc.filter(r => r.id !== id);
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="add-calc-to-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');
        const row = state[cat].calc.find(r => r.id === id);
        if (!row) return;
        state[cat].transactions.push({ id: uid(), note: row.name, amount: row.perUnit * row.qty, date: new Date().toISOString() });
        state[cat].calc = state[cat].calc.filter(r => r.id !== id);
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="add-all-calc-to-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        (state[cat].calc || []).forEach(row => {
          state[cat].transactions.push({ id: uid(), note: row.name, amount: row.perUnit * row.qty, date: new Date().toISOString() });
        });
        state[cat].calc = [];
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="use-calc"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const rows = state[cat].calc || [];
        const total = rows.reduce((s, r) => s + (r.perUnit * r.qty), 0);
        if (totalIncome() <= 0) return;
        state[cat].pct = Math.max(0, Math.min(100, Math.round((total / totalIncome()) * 100)));
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });

    // enter-to-submit
    root.querySelectorAll('.calc-add input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const container = input.closest('.calc-add');
          const btn = container.querySelector('button');
          if (btn) btn.click();
        }
      });
    });
    root.querySelectorAll('.add-tx input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const container = input.closest('.add-tx');
          const btn = container.querySelector('button');
          if (btn) btn.click();
        }
      });
    });
  }

  loadState();
})();
</script>
</body>
</html>
