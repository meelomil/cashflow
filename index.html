  // ---- Helper: terapkan nominal override kebutuhan pokok & hitung ulang alokasi lain ----
  // Logika: pokok pakai nominal aktual (mis. Rp3jt), sisanya (100% - effPokokPct) dibagi
  // ke kantong lain PROPORSIONAL berdasarkan rasio persentase wizard yang sudah ada.
  // Total SELALU = 100%. Kantong utang diabiarkan tetap jika aktif.
  function applyPokokNominalValue(nominalPokok) {
    const inc = totalIncome();
    if (!nominalPokok || nominalPokok <= 0 || inc <= 0) return;

    // Persen efektif kebutuhan pokok dari pemasukan
    const effPokokPct = Math.round((nominalPokok / inc) * 100);

    // Sisa persen yang tersedia untuk kantong-kantong lain
    // Kalau ada utang aktif, kurangi dulu porsinya supaya total tetap 100%
    const utangPct = state.utang.enabled ? (Number(state.utang.pct) || 0) : 0;
    const sisaPct = Math.max(0, 100 - effPokokPct - utangPct);

    // Bobot proporsional dari alokasi wizard saat ini (SEBELUM diubah)
    const others = [
      { key: 'darurat',   weight: Math.max(1, Number(state.darurat.pct)   || 0) },
      { key: 'tabungan',  weight: Math.max(1, Number(state.tabungan.pct)  || 0) },
      { key: 'investasi', weight: Math.max(1, Number(state.investasi.pct) || 0) },
      { key: 'tambahan',  weight: Math.max(1, Number(state.tambahan.pct)  || 0) },
    ];
    const totalWeight = others.reduce((s, o) => s + o.weight, 0);

    // SET ulang persen masing-masing kantong (replace, bukan add)
    let distributed = 0;
    others.forEach((o, idx) => {
      if (idx < others.length - 1) {
        const newPct = Math.round(sisaPct * (o.weight / totalWeight));
        state[o.key].pct = newPct;
        distributed += newPct;
      } else {
        // kantong terakhir dapat sisa pembulatan supaya total pas
        state[o.key].pct = Math.max(0, sisaPct - distributed);
      }
    });

    // Simpan: pokok.pct = pct efektif, nominalOverride = nilai nominal
    state.pokok.pct = effPokokPct;
    state.pokok.nominalOverride = nominalPokok;
    uiState.pokokNominalMode = true;
  }

  function attachCardEvents() {
    // pokok nominal mode
    const togglePokokNominal = root.querySelector('[data-action="toggle-pokok-nominal-mode"]');
    if (togglePokokNominal) togglePokokNominal.addEventListener('click', () => {
      const isCurrentlyNominal = uiState.pokokNominalMode || (state.pokok.nominalOverride !== null && state.pokok.nominalOverride > 0);
      if (isCurrentlyNominal) {
        // kembali ke mode persen — hapus override
        state.pokok.nominalOverride = null;
        uiState.pokokNominalMode = false;
        saveState();
      } else {
        uiState.pokokNominalMode = true;
      }
      render();
    });

    const applyPokokNominal = root.querySelector('[data-action="apply-pokok-nominal"]');
    if (applyPokokNominal) applyPokokNominal.addEventListener('click', async () => {
      const input = document.getElementById('pokok-nominal-input');
      if (!input) return;
      const val = parseMoneyString(input.value);
      if (!val || val <= 0) { input.focus(); return; }
      applyPokokNominalValue(val);
      render(); await saveState();
    });

    // generic pct setters
    root.querySelectorAll('[data-action="set-pct"]').forEach(el => {
      el.addEventListener('change', async (e) => {
        const cat = e.target.getAttribute('data-cat');
        const val = Math.max(0, Math.min(100, Number(e.target.value) || 0));
        if (cat === 'utang') state.utang.pct = val;
        else {
          state[cat].pct = val;
          // kalau pokok pct diubah manual, reset nominal override
          if (cat === 'pokok') { state.pokok.nominalOverride = null; uiState.pokokNominalMode = false; }
        }
        render(); await saveState();
      });
    });

    root.querySelectorAll('[data-action="add-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {

        const amountInput = root.querySelector(`[data-role="amount-${cat}"]`);
        const dateInput = root.querySelector(`[data-role="txdate-${cat}"]`);
        const amount = parseMoneyString(amountInput.value);
        if (!amount || amount <= 0) { amountInput.focus(); return; }
        state[cat].transactions.push({ id: uid(), note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });

      });
    });

    root.querySelectorAll('[data-action="del-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');

        render(); await saveState();
      });
    });

    // darurat
    const daruratMonths = root.querySelector('[data-action="set-darurat-months"]');
    if (daruratMonths) daruratMonths.addEventListener('change', async (e) => {
      state.darurat.targetMonths = Math.max(1, Number(e.target.value) || 1);
      render(); await saveState();
    });
    const daruratPct = root.querySelector('[data-action="set-darurat-pct"]');
    if (daruratPct) daruratPct.addEventListener('change', async (e) => {
      state.darurat.pct = Math.max(0, Math.min(100, Number(e.target.value) || 0));
      render(); await saveState();
    });
    const addDarurat = root.querySelector('[data-action="add-tx-darurat"]');
    if (addDarurat) addDarurat.addEventListener('click', async () => {
      const type = root.querySelector('[data-role="type-darurat"]').value;
      const noteInput = root.querySelector('[data-role="note-darurat"]');
      const amountInput = root.querySelector('[data-role="amount-darurat"]');
      const dateInput = root.querySelector('[data-role="txdate-darurat"]');
      const amount = parseMoneyString(amountInput.value);
      if (!amount || amount <= 0) { amountInput.focus(); return; }
      state.darurat.transactions.push({ id: uid(), type, note: noteInput.value.trim(), amount, date: (dateInput && dateInput.value) || todayStr() });
      render(); await saveState();
    });
    root.querySelectorAll('[data-action="del-tx-darurat"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const id = e.currentTarget.getAttribute('data-id');
        state.darurat.transactions = state.darurat.transactions.filter(t => t.id !== id);
        render(); await saveState();

    const enableUtang = root.querySelector('[data-action="enable-utang"]');

      render();

    const confirmAddUtangItem = root.querySelector('[data-action="confirm-add-utang-item"]');
    if (confirmAddUtangItem) confirmAddUtangItem.addEventListener('click', async () => {
      const nameInput = root.querySelector('[data-role="utang-item-name"]');
      const amountInput = root.querySelector('[data-role="utang-item-amount"]');
      const name = nameInput ? nameInput.value.trim() : '';
      const amount = amountInput ? parseMoneyString(amountInput.value) : 0;
      if (!name) { if (nameInput) nameInput.focus(); return; }
      if (!amount || amount <= 0) { if (amountInput) amountInput.focus(); return; }
      if (!state.utang.items) state.utang.items = [];
      state.utang.items.push({ id: uid(), name, amount });
      // Update pct otomatis dari total items
      const inc = totalIncome();
      if (inc > 0) {
        const totalItems = state.utang.items.reduce((s, it) => s + (Number(it.amount) || 0), 0);
        state.utang.pct = Math.round((totalItems / inc) * 100);

      render(); await saveState();

    root.querySelectorAll('[data-action="del-utang-item"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const id = e.currentTarget.getAttribute('data-id');

        uiState.confirmModal = {
          message: `Hapus cicilan "${item ? item.name : ''}"? Tandai ini jika cicilan sudah lunas atau selesai.`,
          confirmLabel: 'Ya, sudah lunas',
          safe: true,
          onConfirm: async () => {
            state.utang.items = (state.utang.items || []).filter(it => it.id !== id);
            // Update pct dari sisa items
            const inc = totalIncome();
            if (inc > 0) {
              const totalItems = state.utang.items.reduce((s, it) => s + (Number(it.amount) || 0), 0);
              state.utang.pct = Math.round((totalItems / inc) * 100);
            } else {
              state.utang.pct = 0;
            }
            // Jika tidak ada cicilan tersisa, nonaktifkan pos
            if (state.utang.items.length === 0) {
              state.utang.enabled = false;
              state.utang.pct = 0;

            await saveState();
          }
        };
        render();
      });
    });

    // calculator (estimasi kebutuhan)
    root.querySelectorAll('[data-action="toggle-calc"]').forEach(el => {
      el.addEventListener('click', () => {
        const cat = el.getAttribute('data-cat');
        uiState.calcOpen[cat] = !uiState.calcOpen[cat];
        render();
      });
    });
    root.querySelectorAll('[data-action="add-calc-row"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const nameInput = root.querySelector(`[data-role="calc-name-${cat}"]`);
        const perUnitInput = root.querySelector(`[data-role="calc-perunit-${cat}"]`);
        const qtyInput = root.querySelector(`[data-role="calc-qty-${cat}"]`);
        const perUnit = parseMoneyString(perUnitInput.value);
        const qty = Number(qtyInput.value);
        const itemName = nameInput.value.trim();
        if (!itemName) { nameInput.focus(); return; }
        if (!perUnit || perUnit <= 0 || !qty || qty <= 0) {
          (perUnit > 0 ? qtyInput : perUnitInput).focus();
          return;
        }
        state[cat].calc.push({ id: uid(), name: itemName, perUnit, qty });
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="del-calc-row"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');
        state[cat].calc = state[cat].calc.filter(r => r.id !== id);
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="add-calc-to-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const id = e.currentTarget.getAttribute('data-id');
        const row = state[cat].calc.find(r => r.id === id);
        if (!row) return;
        state[cat].transactions.push({ id: uid(), note: row.name, amount: row.perUnit * row.qty, date: new Date().toISOString() });
        state[cat].calc = state[cat].calc.filter(r => r.id !== id);
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="add-all-calc-to-tx"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        (state[cat].calc || []).forEach(row => {
          state[cat].transactions.push({ id: uid(), note: row.name, amount: row.perUnit * row.qty, date: new Date().toISOString() });
        });
        state[cat].calc = [];
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });
    root.querySelectorAll('[data-action="use-calc"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        const cat = e.currentTarget.getAttribute('data-cat');
        const rows = state[cat].calc || [];
        const total = rows.reduce((s, r) => s + (r.perUnit * r.qty), 0);
        const inc = totalIncome();
        if (inc <= 0) return;
        if (cat === 'pokok') {
          applyPokokNominalValue(total);
        } else {
          state[cat].pct = Math.max(0, Math.min(100, Math.round((total / inc) * 100)));
        }
        uiState.calcOpen[cat] = true;
        render(); await saveState();
      });
    });

    // enter-to-submit
    root.querySelectorAll('.calc-add input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const container = input.closest('.calc-add');
          const btn = container.querySelector('button');
          if (btn) btn.click();
        }
      });
    });
    root.querySelectorAll('.add-tx input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const container = input.closest('.add-tx');
          const btn = container.querySelector('button');
          if (btn) btn.click();
        }
      });
    });
  }

  loadState();
})();
</script>
</body>
</html>
